  - Built a Kubernetes infrastructure from the ground up using Pulumi for IaC, designing the multi-pod topology and autoscaling strategy across staging and production environments
  - Implemented gRPC-based service-to-service communication with Protocol Buffers for type-safe contracts, reducing payload size and latency compared to REST across internal microservices
  - Designed a high-throughput webhook system supporting multiple upstream sources and fan-out delivery, with deduplication logic to guarantee idempotent event processing under bulk load
  - Owned the Stripe integration end-to-end — a multi-PaymentIntent Stripe Connect architecture across per-retailer accounts, full lifecycle ops (capture / refund / revision / multicapture / incremental auth), and a fault-tolerant reconciliation layer for partial-failure recovery
